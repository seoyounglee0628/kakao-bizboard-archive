<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>광고 소재 아카이브</title>
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1/dist/cropper.min.css" />
</head>
<body>
  <header class="topbar">
    <h1>📌 광고 소재 아카이브</h1>
    <div class="topbar-actions">
      <button id="btnAdd" class="btn btn-primary">+ 광고 추가</button>
    </div>
  </header>

  <main>
    <section class="filters">
      <input type="text" id="fSearch" placeholder="브랜드 / 카피 / 메모 검색" />

      <select id="fMedia">
        <option value="">매체 전체</option>
        <option value="Google">Google</option>
        <option value="Meta">Meta</option>
        <option value="Kakao">Kakao</option>
        <option value="CPA">CPA</option>
        <option value="TMS">TMS</option>
        <option value="LMS">LMS</option>
      </select>

      <select id="fSize">
        <option value="">사이즈 전체</option>
        <option value="가로">가로형</option>
        <option value="세로">세로형</option>
        <option value="정방형">정방형</option>
      </select>

      <input type="date" id="fDateFrom" />
      <span class="filter-sep">~</span>
      <input type="date" id="fDateTo" />

      <select id="fSort">
        <option value="dateDesc">최신 캡처순</option>
        <option value="dateAsc">오래된 캡처순</option>
        <option value="brand">브랜드순</option>
      </select>

      <button id="btnResetFilter" class="btn btn-ghost">초기화</button>
      <button id="btnRefresh" class="btn btn-ghost" title="다른 팀원이 올린 최신 내용 불러오기">🔄 새로고침</button>
    </section>

    <p class="count-line"><span id="resultCount">0</span>개의 광고</p>

    <section id="gallery" class="gallery"></section>
    <p id="emptyState" class="empty-state" hidden>아직 저장된 광고가 없습니다. 오른쪽 위의 "+ 광고 추가"로 스크린샷을 업로드해보세요.</p>
  </main>

  <!-- Add/Edit Modal -->
  <div id="modalBackdrop" class="modal-backdrop" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">광고 추가</h2>
        <button id="btnCloseModal" class="btn-icon">✕</button>
      </div>

      <div class="modal-body">
        <div id="dropZone" class="drop-zone">
          <img id="previewImg" hidden />
          <p id="dropZoneText">이미지를 드래그하거나 클릭해서 선택 (붙여넣기 Ctrl/Cmd+V 가능)</p>
          <input type="file" id="fileInput" accept="image/*" hidden />
        </div>
        <button id="btnRecrop" class="btn btn-ghost recrop-btn" type="button" hidden>✂️ 다시 자르기</button>

        <div id="cropStage" class="crop-stage" hidden>
          <div class="crop-image-wrap">
            <img id="cropImage" />
          </div>
          <div class="crop-actions">
            <button id="btnCropSkip" class="btn btn-ghost" type="button">원본 그대로 사용</button>
            <button id="btnCropApply" class="btn btn-primary" type="button">자르기 적용</button>
          </div>
        </div>

        <p id="ocrStatus" class="ocr-status" hidden></p>

        <div class="form-grid">
          <label>브랜드 / 광고주
            <input type="text" id="inBrand" placeholder="예: 올리브영" />
          </label>

          <label>매체
            <select id="inMedia">
              <option value="">선택 안 함</option>
              <option value="Google">Google</option>
              <option value="Meta">Meta</option>
              <option value="Kakao">Kakao</option>
              <option value="CPA">CPA</option>
              <option value="TMS">TMS</option>
              <option value="LMS">LMS</option>
            </select>
          </label>

          <label>소재 형식
            <select id="inFormat">
              <option value="">선택 안 함</option>
              <option value="오브젝트">오브젝트형</option>
              <option value="이미지">이미지형</option>
              <option value="영상">영상형</option>
              <option value="앱푸시">앱푸시</option>
              <option value="브랜드 메시지">브랜드 메시지</option>
              <option value="알림톡">알림톡</option>
              <option value="캐러셀">캐러셀</option>
              <option value="기타">기타</option>
            </select>
          </label>

          <label>소재 사이즈
            <select id="inSize">
              <option value="">선택 안 함</option>
              <option value="가로">가로형</option>
              <option value="세로">세로형</option>
              <option value="정방형">정방형</option>
            </select>
          </label>

          <label>캡처 날짜
            <input type="date" id="inDate" />
          </label>

          <label class="full-width">카피 문구
            <input type="text" id="inCopy" placeholder="배너에 노출된 문구" />
          </label>

          <label class="full-width">메모
            <textarea id="inMemo" rows="2" placeholder="자유 메모"></textarea>
          </label>
        </div>
      </div>

      <div class="modal-footer">
        <button id="btnDelete" class="btn btn-danger" hidden>삭제</button>
        <div class="spacer"></div>
        <button id="btnCancel" class="btn btn-ghost">취소</button>
        <button id="btnSave" class="btn btn-primary">저장</button>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detailBackdrop" class="modal-backdrop" hidden>
    <div class="modal modal-detail">
      <div class="modal-header">
        <h2 id="detailTitle">상세보기</h2>
        <button id="btnCloseDetail" class="btn-icon">✕</button>
      </div>
      <div class="modal-body detail-body">
        <img id="detailImg" />
        <dl id="detailMeta" class="detail-meta"></dl>
      </div>
      <div class="modal-footer">
        <button id="btnDetailDelete" class="btn btn-danger">삭제</button>
        <div class="spacer"></div>
        <button id="btnDetailDownload" class="btn btn-ghost">⬇️ 다운로드</button>
        <button id="btnDetailEdit" class="btn btn-primary">수정</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cropperjs@1/dist/cropper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</body>
</html>
